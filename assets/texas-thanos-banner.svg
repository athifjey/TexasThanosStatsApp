  <path d="M1350 122l-120 138" stroke="#e2e8f0" stroke-width="24" stroke-linecap="round" opacity="0.9"/>
  <circle cx="1260" cy="192" r="52" fill="none" stroke="url(#gold)" stroke-width="18"/>
  <path d="M0 520c180-58 338-87 474-87 202 0 294 74 482 74 168 0 380-52 644-158v291H0z" fill="#08111d" fill-opacity="0.72"/>
