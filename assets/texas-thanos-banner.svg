<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 640" role="img" aria-labelledby="title desc">
  <title id="title">Texas Thanos banner</title>
  <desc id="desc">Abstract cricket-themed banner for Texas Thanos.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1320"/>
      <stop offset="50%" stop-color="#1b2347"/>
      <stop offset="100%" stop-color="#3d1457"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" x2="1">
      <stop offset="0%" stop-color="#f2c94c"/>
      <stop offset="100%" stop-color="#f2994a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="640" fill="url(#bg)"/>
  <circle cx="880" cy="210" r="260" fill="url(#glow)"/>
  <circle cx="1180" cy="110" r="120" fill="#f2c94c" fill-opacity="0.08"/>
  <circle cx="1320" cy="520" r="180" fill="#8b5cf6" fill-opacity="0.12"/>
