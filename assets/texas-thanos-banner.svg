  <text x="130" y="390" fill="url(#gold)" font-family="Racing Sans One, Barlow, Arial, sans-serif" font-size="138" letter-spacing="4">THANOS</text>
  <text x="136" y="458" fill="#cbd5e1" font-family="Barlow, Arial, sans-serif" font-size="34" font-weight="600" letter-spacing="7">CRICKET TEAM STATISTICS</text>
